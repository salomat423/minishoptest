services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: minishop
      POSTGRES_PASSWORD: minishop
      POSTGRES_DB: minishop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minishop -d minishop"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 minishop.wsgi:application
    ports:
      - "8000:8000"
    environment:
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-docker-change-me}
      DATABASE_URL: postgres://minishop:minishop@db:5432/minishop
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ORDER_PROCESSING_DELAY_MINUTES: "5"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: .
    command: celery -A minishop worker -l info
    environment:
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-docker-change-me}
      DATABASE_URL: postgres://minishop:minishop@db:5432/minishop
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ORDER_PROCESSING_DELAY_MINUTES: "5"
    depends_on:
      web:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
